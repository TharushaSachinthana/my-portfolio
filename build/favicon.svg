<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e40af" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background circle with gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <ellipse cx="38" cy="35" rx="30" ry="25" fill="url(#shine)" opacity="0.4"/>
  <!-- Letters TS -->
  <text x="50" y="62" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">TS</text>
</svg>
